      - any-glob-to-any-file:
          - "docs/**"
          - "*.md"

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - "apps/dashboard/**"
          - "website/**"

desktop:
  - changed-files:
      - any-glob-to-any-file:
          - "apps/desktop/**"

backend:
  - changed-files:
      - any-glob-to-any-file:
          - "apps/agent-service/**"
          - "convex/**"
          - "scripts/**"

security:
