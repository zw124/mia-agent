name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - moltenhub-refactor-this-repository-to-reduce-the-c

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install agent service
        run: python -m pip install -e "apps/agent-service[dev]"

      - name: Run Python tests
        working-directory: apps/agent-service
        run: python -m pytest
